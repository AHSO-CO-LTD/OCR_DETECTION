name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Create config.yaml from template
        run: Copy-Item config.yaml.example config.yaml
        shell: powershell

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        shell: powershell

      - name: Install torch (CPU-only for build)
        run: |
          pip install torch==2.0.1+cpu torchvision==0.15.2+cpu --extra-index-url https://download.pytorch.org/whl/cpu
        shell: powershell

      - name: Install ultralytics
        run: pip install ultralytics>=8.0.0
        shell: powershell

      - name: Verify installation
        run: |
          python -c "import PyQt5; print('PyQt5 OK')"
          python -c "import torch; print('torch OK:', torch.__version__)"
          python -c "import cv2; print('cv2 OK')"
          python -c "import ultralytics; print('ultralytics OK')"
        shell: powershell

      - name: Build EXE with PyInstaller
        run: pyinstaller build_windows.spec --noconfirm
        shell: powershell

      - name: Create ZIP artifact
        run: |
          $version = git describe --tags --always
          $zipName = "DRB-OCR-AI-$version.zip"
          Compress-Archive -Path dist\DRB-OCR-AI -DestinationPath $zipName
          echo "ZIP_FILE=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        shell: powershell

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: DRB-OCR-AI-Build
          path: dist\DRB-OCR-AI\

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          name: DRB-OCR-AI-Build
          path: release-artifacts/

      - name: Create ZIP from artifacts
        run: |
          cd release-artifacts
          zip -r ../DRB-OCR-AI-$(git describe --tags --always).zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: DRB-OCR-AI-*.zip
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
