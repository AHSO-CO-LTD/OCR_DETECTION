name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Create config.yaml from template
        run: Copy-Item config.yaml.example config.yaml
        shell: powershell

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        shell: powershell

      - name: Install torch (CPU-only for build)
        run: |
          pip install torch==2.0.1+cpu torchvision==0.15.2+cpu --extra-index-url https://download.pytorch.org/whl/cpu
        shell: powershell

      - name: Install ultralytics
        run: pip install ultralytics>=8.0.0
        shell: powershell

      - name: Verify installation
        run: |
          python -c "import PyQt5; print('PyQt5 OK')"
          python -c "import torch; print('torch OK:', torch.__version__)"
          python -c "import cv2; print('cv2 OK')"
          python -c "import ultralytics; print('ultralytics OK')"
        shell: powershell

      - name: Build EXE with PyInstaller
        run: pyinstaller build_windows.spec --noconfirm
        shell: powershell

      - name: Generate manifest and split packages
        run: |
          $version = git describe --tags --always | % {$_.TrimStart('v')}
          python scripts/generate_manifest.py dist/DRB-OCR-AI/ $version
          echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        shell: powershell

      - name: Verify packages created
        run: |
          Get-ChildItem dist/*.zip | ForEach-Object {
            $sizeGB = $_.Length / 1GB
            Write-Host "✓ $($_.Name) - $([Math]::Round($sizeGB * 1024, 1)) MB"
          }
        shell: powershell

      - name: Upload artifact - app directory
        uses: actions/upload-artifact@v5
        with:
          name: DRB-OCR-AI-Build
          path: dist\DRB-OCR-AI\

      - name: Upload artifact - ZIP packages and manifest
        uses: actions/upload-artifact@v5
        with:
          name: DRB-OCR-AI-Packages
          path: |
            dist\DRB-OCR-AI-v*.zip
            dist\manifest*.json

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download package artifacts
        uses: actions/download-artifact@v5
        with:
          name: DRB-OCR-AI-Packages
          path: release-artifacts/

      - name: Prepare release files
        run: |
          VERSION=$(git describe --tags --always | sed 's/^v//')

          echo "VERSION=$VERSION" >> $GITHUB_ENV

          # List downloaded files
          echo "Downloaded files:"
          ls -lh release-artifacts/

          # Move files to root for release
          mkdir -p dist
          cp release-artifacts/DRB-OCR-AI-v*.zip dist/ 2>/dev/null || true
          cp release-artifacts/manifest*.json dist/ 2>/dev/null || true

          echo "Files ready for release:"
          ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/DRB-OCR-AI-v*.zip
            dist/manifest*.json
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
