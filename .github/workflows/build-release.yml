name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Create config.yaml from template
        run: |
          Copy-Item config.yaml.example config.yaml
        shell: powershell

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller build_windows.spec --noconfirm

      - name: Create ZIP artifact
        run: |
          $version = git describe --tags --always
          $zipName = "DRB-OCR-AI-$version.zip"
          Compress-Archive -Path dist/DRB-OCR-AI -DestinationPath $zipName
          echo "ZIP_FILE=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        shell: powershell

      - name: Upload artifact to workflow
        uses: actions/upload-artifact@v5
        with:
          name: DRB-OCR-AI-Build
          path: dist/DRB-OCR-AI/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          name: DRB-OCR-AI-Build
          path: release-artifacts/

      - name: Create ZIP from artifacts
        run: |
          cd release-artifacts
          zip -r ../DRB-OCR-AI-$(git describe --tags --always).zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DRB-OCR-AI-*.zip
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Notify release created
        run: |
          echo "✅ Release created: ${{ github.ref_name }}"
          echo "📦 Download from: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
