name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Create config.yaml from template
        run: Copy-Item config.yaml.example config.yaml
        shell: powershell

      - name: Install dependencies from requirements.txt
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        shell: pwsh

      - name: Verify installation
        run: |
          python -c "import PyQt5; print('PyQt5 OK')"
          python -c "import torch; print('torch OK:', torch.__version__)"
          python -c "import cv2; print('cv2 OK')"
          python -c "import ultralytics; print('ultralytics OK')"
          python -c "import sklearn; print('sklearn OK')"
          python -c "import peewee; print('peewee OK')"
          python -c "import bcrypt; print('bcrypt OK')"
        shell: pwsh

      - name: Build EXE with PyInstaller
        run: pyinstaller build_windows.spec --noconfirm
        shell: pwsh

      - name: Debug - List dist directory
        run: |
          Write-Host "=== dist/ directory ==="
          Get-ChildItem -Path dist -Recurse -Depth 1 | Format-Table Name, Length, FullName
        shell: pwsh

      - name: Get version from tag
        id: version
        run: |
          $fullVersion = git describe --tags --always
          Write-Host "Full version string: $fullVersion"
          # Remove 'v' prefix and handle cases like "v1.2.0-5-gabcdef"
          $version = $fullVersion.TrimStart('v').Split('-')[0]
          Write-Host "Extracted version: $version"
          # Use step output instead of GITHUB_ENV for more reliable access
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Add-Content -Path $env:GITHUB_ENV -Value "VERSION=$version" -Encoding utf8
        shell: pwsh

      - name: Verify version environment
        run: |
          Write-Host "VERSION env var: '$env:VERSION'"
          if ([string]::IsNullOrEmpty($env:VERSION)) {
            Write-Error "VERSION environment variable is empty!"
            exit 1
          }
        shell: pwsh

      - name: Generate manifest and split packages
        run: |
          Write-Host "Generating manifest for version: $env:VERSION"
          python scripts/generate_manifest.py dist/DRB-OCR-AI/ $env:VERSION
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Manifest generation failed with exit code $LASTEXITCODE"
            exit 1
          }
          Write-Host "Manifest generation completed successfully"
        shell: pwsh

      - name: Debug - List all output files
        run: |
          Write-Host "=== Files in dist/ ==="
          Get-ChildItem -Path dist -File | ForEach-Object {
            $sizeMB = [Math]::Round($_.Length / 1MB, 1)
            Write-Host "  $($_.Name) - $sizeMB MB"
          }
          Write-Host ""
          Write-Host "=== manifest.json inside app ==="
          if (Test-Path "dist/DRB-OCR-AI/manifest.json") {
            Write-Host "  OK - dist/DRB-OCR-AI/manifest.json exists"
          } else {
            Write-Host "  MISSING - dist/DRB-OCR-AI/manifest.json"
          }
        shell: pwsh

      - name: Upload release packages
        uses: actions/upload-artifact@v4
        with:
          name: release-packages
          path: |
            dist/DRB-OCR-AI-v*-core.zip
            dist/DRB-OCR-AI-v*-full.zip
            dist/manifest-v*.json
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download release packages
        uses: actions/download-artifact@v4
        with:
          name: release-packages
          path: packages/

      - name: Debug - List downloaded files
        run: |
          echo "=== Downloaded packages ==="
          ls -lhR packages/
          echo ""
          echo "=== File count ==="
          find packages/ -type f | wc -l

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
